<!DOCTYPE html>
<html>
<head>
    <title>The List</title>

    <!--CSS card testing learning stuff-->
    <style>
        body {
            font-family: "Segoe Print", "Comic Sans MS", cursive;
            margin: 0;
            padding: 40px;
            padding-left: 115px;
            background-color: #fffdf3;
            background-image: linear-gradient(#d8e8ff 1px, transparent 1px);
            background-size: 100% 32px, 80px 100%;
            background-position: 0 0, 80px 0;
        }

        body::before {
            content: "";
            position: fixed;
            left: 80px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ff9a9a;
            pointer-events: none;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            padding-top: 9px;
            font-size: 55px;
        }

        h2 {
            margin-left: 20px;
        }

        .add-section {
            background: white;
            padding: 16px;
            margin: 20px;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .item-card {
            background: #fff176;
            width: 230px;
            min-height: 190px;
            padding: 18px;
            box-shadow: 4px 6px 10px rgba(0, 0, 0, 0.25);
            transform: rotate(-1deg);
            border-radius: 3px;
        }

            .item-card:nth-child(even) {
                transform: rotate(1.5deg);
            }

            .item-card h3 {
                margin-top: 0;
            }

            .item-card input,
            .item-card select {
                width: 100%;
                box-sizing: border-box;
                margin: 4px 0 8px 0;
            }

            .item-card button {
                margin-top: 6px;
                margin-right: 4px;
                cursor: pointer;
            }
    </style>
</head>
<body>
    <h1>The List</h1>

    <h2>Add Item</h2>

    <input id="nameInput" placeholder="Item name">
    <input id="quantityInput" placeholder="Quantity">
    <input id="categoryInput" placeholder="Category">

    <select id="statusInput">
        <option value="needed">needed</option>
        <option value="in_stock">in_stock</option>
        <option value="running_low">running_low</option>
        <option value="bought">bought</option>
    </select>

    <button onclick="addItem()">Add Item</button>

    <h2>Items</h2>

    <div id="itemsList" class="cards-container"></div>

    <script>
        async function loadItems() {
            const response = await fetch("/items");
            const data = await response.json();

            const itemsList = document.getElementById("itemsList");
            itemsList.innerHTML = "";

            for (const item of data.items) {
                const itemCard = document.createElement("div");
                itemCard.className = "item-card";

                itemCard.innerHTML =                `
                        <strong>${item.name}</strong>
                        - Category: ${item.category}
                        <br>

                        Quantity:
                        <input id="quantity-${item.id}" value="${item.quantity}">
                        <button onclick="updateQuantity(${item.id})">Save Quantity</button>

                        <br>

                        Status:
                        <select id="status-${item.id}">
                            <option value="needed" ${item.status === "needed" ? "selected" : ""}>needed</option>
                            <option value="in_stock" ${item.status === "in_stock" ? "selected" : ""}>in_stock</option>
                            <option value="running_low" ${item.status === "running_low" ? "selected" : ""}>running_low</option>
                            <option value="bought" ${item.status === "bought" ? "selected" : ""}>bought</option>
                        </select>

                        <button onclick="updateStatus(${item.id})">Save Status</button>
                        <button onclick="deleteItem(${item.id})">Delete</button>
                    `;

                itemsList.appendChild(itemCard);
            }
        }

        async function addItem() {
            const name = document.getElementById("nameInput").value;
            const quantity = document.getElementById("quantityInput").value;
            const category = document.getElementById("categoryInput").value;
            const status = document.getElementById("statusInput").value;

            if (name === "") {
                alert("Item name is required.");
                return;
            }

            await fetch("/items", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    quantity: quantity,
                    category: category,
                    status: status
                })
            });

            document.getElementById("nameInput").value = "";
            document.getElementById("quantityInput").value = "";
            document.getElementById("categoryInput").value = "";

            loadItems();
        }

        async function updateQuantity(id) {
            const quantityInput = document.getElementById(`quantity-${id}`);
            const newQuantity = quantityInput.value;

            await fetch(`/items/${id}/quantity`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    quantity: newQuantity
                })
            });

            loadItems();
        }

        async function updateStatus(id) {
            const statusDropdown = document.getElementById(`status-${id}`);
            const newStatus = statusDropdown.value;

            await fetch(`/items/${id}/status`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: newStatus
                })
            });

            loadItems();
        }

        async function deleteItem(id) {
            await fetch(`/items/${id}`, {
                method: "DELETE"
            });

            loadItems();
        }

        loadItems();
    </script>
</body>
</html>
